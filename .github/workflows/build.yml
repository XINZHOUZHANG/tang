name: Build ESP32 Firmware

# 触发条件
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 核心修改 1：必须显式授予 Action 写入代码库以创建 Release 的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Run PlatformIO Build
      run: pio run

    # 核心修改 2：把隐藏文件夹里的 firmware.bin 拷贝出来并重命名为 tang.bin
    - name: Prepare Firmware
      run: cp .pio/build/esp32dev/firmware.bin tang.bin

    # 核心修改 3：使用 release 插件自动创建发布版本并附带 tang.bin
    - name: Create Release and Upload Firmware
      uses: softprops/action-gh-release@v2
      with:
        # 自动生成版本号，例如 v1.0.5 (基于 GitHub 运行次数累加)
        tag_name: v1.0.${{ github.run_number }}
        name: "唐诗阅读器 更新 #${{ github.run_number }}"
        body: "自动化编译生成的唐诗阅读器固件。下载 `tang.bin` 放入 SD 卡即可使用。"
        # 指定需要作为附件上传的文件
        files: tang.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
